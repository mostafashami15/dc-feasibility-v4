<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ report.title }}</title>
  <style>
    :root {
      --primary: {{ theme.primary_color }};
      --secondary: {{ theme.secondary_color }};
      --text: #1a202c;
      --muted: #718096;
      --border: #e2e8f0;
      --surface: #f7fafc;
      --surface-alt: #edf2f7;
      --accent-green: #38a169;
      --accent-amber: #d69e2e;
      --accent-red: #e53e3e;
    }

    @page {
      size: A4 portrait;
      margin: 15mm 18mm;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: {{ theme.font_family }};
      color: var(--text);
      font-size: 10.5pt;
      line-height: 1.5;
      background: white;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ----- Page breaks ----- */
    .page-break {
      page-break-before: always;
      break-before: page;
    }

    /* ----- Cover page ----- */
    .cover {
      min-height: 260mm;
      padding: 40px;
      background: linear-gradient(160deg, var(--primary) 0%, #193754 55%, #f7fafc 55.1%, white 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }
    .cover-content {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 40px;
      align-items: center;
    }
    .cover-left { color: white; }
    .cover-logo { max-height: 48px; margin-bottom: 24px; }
    .cover-kicker {
      font-size: 9pt;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 12px;
    }
    .cover-title {
      font-size: 32pt;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .cover-subtitle {
      font-size: 12pt;
      color: rgba(255,255,255,0.85);
      max-width: 48ch;
      line-height: 1.5;
    }
    .cover-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 32px;
    }
    .cover-meta-item {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .cover-meta-label {
      font-size: 8pt;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }
    .cover-meta-value {
      font-size: 16pt;
      font-weight: 700;
      color: white;
      margin-top: 4px;
    }
    .cover-right {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .cover-right .scope-title {
      font-size: 13pt;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
    }

    /* ----- Section headers ----- */
    .section-header {
      border-bottom: 3px solid var(--primary);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .section-number {
      font-size: 9pt;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--secondary);
    }
    .section-title {
      font-size: 18pt;
      font-weight: 700;
      color: var(--primary);
      margin-top: 4px;
      line-height: 1.2;
    }
    .section-subtitle {
      font-size: 10pt;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ----- Sub-section ----- */
    .subsection-title {
      font-size: 11pt;
      font-weight: 700;
      color: var(--primary);
      margin: 18px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    /* ----- Metric cards ----- */
    .metric-row {
      display: grid;
      gap: 12px;
      margin: 16px 0;
    }
    .metric-row-3 { grid-template-columns: repeat(3, 1fr); }
    .metric-row-4 { grid-template-columns: repeat(4, 1fr); }
    .metric-row-5 { grid-template-columns: repeat(5, 1fr); }
    .metric-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      background: linear-gradient(180deg, white 0%, var(--surface) 100%);
      text-align: center;
      break-inside: avoid;
    }
    .metric-label {
      font-size: 8pt;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .metric-value {
      font-size: 18pt;
      font-weight: 800;
      color: var(--text);
      margin-top: 4px;
    }
    .metric-value.highlight { color: var(--primary); }

    /* ----- Fact panels (key-value pairs) ----- */
    .fact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 12px 0;
    }
    .fact-panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      background: white;
      break-inside: avoid;
    }
    .fact-panel-title {
      font-size: 9pt;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 10px;
    }
    .fact-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid var(--surface-alt);
    }
    .fact-row:last-child { border-bottom: none; }
    .fact-label {
      font-size: 9pt;
      color: var(--muted);
      flex-shrink: 0;
      margin-right: 12px;
    }
    .fact-value {
      font-size: 10pt;
      font-weight: 600;
      color: var(--text);
      text-align: right;
    }

    /* ----- RAG badges ----- */
    .rag-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 9pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .rag-green { background: #c6f6d5; color: #22543d; }
    .rag-amber { background: #fefcbf; color: #744210; }
    .rag-red { background: #fed7d7; color: #742a2a; }

    /* ----- Map images ----- */
    .map-container {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin: 12px 0;
      break-inside: avoid;
    }
    .map-container img {
      display: block;
      width: 100%;
      height: auto;
    }
    .map-caption {
      font-size: 8.5pt;
      color: var(--muted);
      padding: 6px 12px;
      background: var(--surface);
      text-align: center;
    }

    /* ----- SVG charts ----- */
    .chart-container {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: var(--surface);
      margin: 12px 0;
      break-inside: avoid;
    }
    .chart-container svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .chart-title {
      font-size: 10pt;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    /* ----- Tables ----- */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin: 12px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }
    th {
      background: var(--primary);
      color: white;
      font-size: 8.5pt;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 10px;
      text-align: left;
    }
    td {
      font-size: 9.5pt;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: var(--surface); }
    thead { display: table-header-group; }
    tr { break-inside: avoid; page-break-inside: avoid; }

    /* ----- Callout / narrative ----- */
    .callout {
      border-left: 4px solid var(--secondary);
      background: var(--surface);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 12px 0;
      break-inside: avoid;
    }
    .callout p {
      font-size: 9.5pt;
      color: #2d3748;
      line-height: 1.55;
    }
    .callout p + p { margin-top: 6px; }

    /* ----- Notes list ----- */
    .note-list {
      margin: 8px 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 9pt;
    }
    .note-list li + li { margin-top: 4px; }

    /* ----- Badge/tag ----- */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface-alt);
      color: var(--muted);
      font-size: 8pt;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ----- Empty state ----- */
    .empty-state {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 16px;
      color: var(--muted);
      font-size: 9.5pt;
      text-align: center;
      margin: 12px 0;
    }

    /* ----- Spacing utilities ----- */
    .mt-sm { margin-top: 8px; }
    .mt-md { margin-top: 16px; }
    .mt-lg { margin-top: 24px; }
    .mb-sm { margin-bottom: 8px; }
    .mb-md { margin-bottom: 16px; }

    /* ----- Two column layout ----- */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ----- Full width chart pair ----- */
    .chart-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 12px 0;
    }

    /* ----- Footer ----- */
    .report-footer {
      margin-top: 32px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 8pt;
      color: var(--muted);
      text-align: center;
    }

    @media print {
      body { background: white; }
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
